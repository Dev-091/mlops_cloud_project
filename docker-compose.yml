version: "3.8"
services:
  api:
    build: .
    ports: [ "8000:8000" ]
    env_file: .env
    volumes:
      - ./mlruns:/app/mlruns
  mlflow-ui:
    image: python:3.10-slim
    ports: [ "5000:5000" ]
    volumes:
      - ./mlruns:/app/mlruns
    command: >
      bash -c "pip install mlflow && cd /app && mlflow ui --host 0.0.0.0 --port 5000"
